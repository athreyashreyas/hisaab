<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#1E7F75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hisaab" />
    <meta
      name="description"
      content="An honest reckoning of where your money goes. Local-first, end-to-end encrypted."
    />
    <title>Hisaab</title>

    <!-- Apply the saved theme to <html> before the stylesheet and app load, so
         the very first paint (the splash below, then the app) is already in the
         chosen theme with no flash of the default. Colours resolve from the CSS
         variables in tokens.css once the bundled stylesheet lands. -->
    <script>
      try {
        var t = localStorage.getItem('hisaab.theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    </script>

    <!-- Fonts, loaded off the critical path so they never block first paint. The
         boot splash below uses a system-serif fallback, so text is visible
         instantly and swaps to DM Serif once it arrives. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      />
    </noscript>

    <!-- Critical, inline, zero-network styles so the very first paint is the
         Hisaab splash on parchment — never a blank/black screen while the app
         bundle loads. React replaces #root on mount, which removes the splash. -->
    <style>
      /* Fallback hex for the first frame before the bundled stylesheet (which
         defines the theme variables) loads; once it does, the splash adopts the
         chosen theme's colours. */
      html {
        background: var(--parchment-100, #faf9f6);
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        background: var(--parchment-100, #faf9f6);
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: var(--parchment-100, #faf9f6);
      }
      #boot .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: var(--teal-500, #1e7f75);
        color: var(--on-primary, #fff);
        font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
        font-size: 26px;
        line-height: 1;
        box-shadow: 0 8px 20px -6px rgba(0, 0, 0, 0.28);
      }
      #boot .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--teal-400, #4ba096);
        animation: hisaab-pulse 1.4s ease-in-out infinite;
      }
      @keyframes hisaab-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot .dot {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Instant splash: painted with the HTML, before any JavaScript runs. -->
      <div id="boot" aria-label="Loading Hisaab" role="status">
        <div class="mark">₹</div>
        <div class="dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
